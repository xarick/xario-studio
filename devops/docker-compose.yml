# Shared config for the backend API and the Celery worker — they run the same
# image with the same env, only the command differs.
x-backend-base: &backend-base
  build:
    context: ../backend
  env_file: ../backend/.env
  environment: &backend-env
    DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-xario_db}
    FRONTEND_URL: http://localhost
    CELERY_BROKER_URL: redis://redis:6379/0
    CELERY_RESULT_BACKEND: redis://redis:6379/1
    # AI Provider: openai | gemini | anthropic
    AI_PROVIDER: ${AI_PROVIDER:-openai}
    AI_API_KEY: ${AI_API_KEY:-}
    AI_MODEL: ${AI_MODEL:-gpt-4o-mini}
    AI_BASE_URL: ${AI_BASE_URL:-}
  volumes:
    - storage_data:/app/storage
  depends_on:
    db:
      condition: service_healthy
    redis:
      condition: service_healthy

services:
  # No published port: only the backend and the workers talk to the database, and
  # they do it over the compose network. Publishing 5432 on a server would put
  # Postgres on the public internet. Add a `ports:` mapping locally if you need
  # a psql client on the host.
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-xario_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      # No default — compose refuses to start until this is set.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    <<: *backend-base
    ports:
      - "8000:8000"
    command: >
      sh -c "uv run alembic upgrade head && uv run uvicorn app.main:app --host 0.0.0.0 --port 8000"

  # Two lanes so a one-hour dub can't stall a five-second GIF. `media` handles
  # plain ffmpeg transforms; `heavy` runs whisper / XTTS / Demucs. See
  # backend/src/app/workers/queues.py. Scale either independently:
  #   docker compose up -d --scale worker-media=3
  worker-media:
    <<: *backend-base
    command: >
      sh -c "uv run celery -A app.core.celery_app:celery_app worker -Q media --loglevel=info"

  worker-heavy:
    <<: *backend-base
    command: >
      sh -c "uv run celery -A app.core.celery_app:celery_app worker -Q heavy --loglevel=info"

  frontend:
    build:
      context: ../frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  storage_data:
  redis_data:
