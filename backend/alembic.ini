[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os
# Overwritten at runtime by alembic/env.py from settings.DATABASE_URL (.env).
# Left empty on purpose: a URL here would look like a real credential in a
# public repository, and it would silently shadow nothing anyway.
sqlalchemy.url =

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
